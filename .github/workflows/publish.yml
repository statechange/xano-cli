name: Publish Package

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out the released tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Verify the release commit is on the default branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          git fetch --no-tags origin "+refs/heads/${DEFAULT_BRANCH}:refs/remotes/origin/${DEFAULT_BRANCH}"
          if ! git merge-base --is-ancestor HEAD "origin/${DEFAULT_BRANCH}"; then
            echo "Release commit is not contained in origin/${DEFAULT_BRANCH}." >&2
            exit 1
          fi

      - name: Install an OIDC-capable npm CLI
        run: |
          npm install --global npm@11.5.1
          npm --version

      - name: Verify release identity
        env:
          IS_PRERELEASE: ${{ github.event.release.prerelease }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          node <<'NODE'
          const { name, version } = require("./package.json");
          const packageLock = require("./package-lock.json");
          const isPrerelease = process.env.IS_PRERELEASE;
          const releaseTag = process.env.RELEASE_TAG;
          const expectedTag = `v${version}`;

          if (isPrerelease !== "false" || version.includes("-")) {
            throw new Error(
              "Prereleases are not supported because this workflow publishes to npm's latest dist-tag.",
            );
          }
          if (
            packageLock.name !== name ||
            packageLock.version !== version ||
            packageLock.packages?.[""]?.version !== version
          ) {
            throw new Error("package-lock.json identity does not match package.json.");
          }
          if (releaseTag !== expectedTag) {
            throw new Error(
              `Release tag ${JSON.stringify(releaseTag)} does not match ${JSON.stringify(expectedTag)} for ${name}@${version}.`,
            );
          }

          console.log(`Release identity verified: ${name}@${version} (${releaseTag})`);
          NODE

      - name: Refuse an existing registry version
        run: |
          node <<'NODE'
          const { name, version } = require("./package.json");
          async function verifyVersionIsAvailable() {
            const url = `https://registry.npmjs.org/${encodeURIComponent(name)}/${encodeURIComponent(version)}`;
            const response = await fetch(url, { redirect: "error" });

            if (response.status === 200) {
              throw new Error(`${name}@${version} already exists in the npm registry.`);
            }
            if (response.status !== 404) {
              throw new Error(`npm registry lookup failed with HTTP ${response.status}.`);
            }

            console.log(`Registry version is available: ${name}@${version}`);
          }

          verifyVersionIsAvailable().catch((error) => {
            console.error(error);
            process.exitCode = 1;
          });
          NODE

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify built CLI version
        run: |
          expected="$(node -p 'require("./package.json").version')"
          actual="$(node dist/index.js --version)"
          if [ "$actual" != "$expected" ]; then
            echo "Built CLI reports $actual; package.json declares $expected." >&2
            exit 1
          fi
          echo "Built CLI version verified: $actual"

      - name: Inspect the package payload
        id: pack
        run: |
          npm pack --json > "$RUNNER_TEMP/npm-pack.json"
          node - "$RUNNER_TEMP/npm-pack.json" <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");
          const { name, version, bin } = require("./package.json");
          const [pack] = JSON.parse(fs.readFileSync(process.argv[2], "utf8"));

          if (!pack || pack.name !== name || pack.version !== version) {
            throw new Error("Packed package identity does not match package.json.");
          }

          const files = new Set(pack.files.map(({ path }) => path));
          const requiredFiles = [
            "README.md",
            "skills/performance-analysis/SKILL.md",
            "skills/xano-cli/SKILL.md",
            ...Object.values(bin).map((path) => path.replace(/^\.\//, "")),
          ];
          const missingFiles = requiredFiles.filter((path) => !files.has(path));
          if (missingFiles.length > 0) {
            throw new Error(`Packed package is missing: ${missingFiles.join(", ")}`);
          }

          console.log(
            `Package payload verified: ${pack.filename} (${pack.entryCount} files, ${pack.size} bytes)`,
          );
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `tarball=${path.resolve(pack.filename)}\n`);
          NODE

      # npm exchanges GitHub's OIDC identity for a short-lived publish token.
      # Deliberately do not set NODE_AUTH_TOKEN or use an npm automation secret.
      - name: Publish to npm
        run: npm publish "${{ steps.pack.outputs.tarball }}" --access public --ignore-scripts

      - name: Verify registry metadata and provenance
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          node <<'NODE'
          const { name, version } = require("./package.json");
          const expectedRepository = "https://github.com/statechange/xano-cli";
          const expectedWorkflow = ".github/workflows/publish.yml";
          const expectedRef = `refs/tags/${process.env.RELEASE_TAG}`;
          const delay = (milliseconds) => new Promise((resolve) => setTimeout(resolve, milliseconds));

          async function fetchJson(url) {
            const response = await fetch(url, { redirect: "error" });
            if (!response.ok) {
              throw new Error(`${url} returned HTTP ${response.status}.`);
            }
            return response.json();
          }

          async function waitForPublishedMetadata() {
            const packageUrl = `https://registry.npmjs.org/${encodeURIComponent(name)}`;
            let lastError;
            for (let attempt = 1; attempt <= 12; attempt += 1) {
              try {
                const metadata = await fetchJson(packageUrl);
                const published = metadata.versions?.[version];
                if (
                  metadata["dist-tags"]?.latest === version &&
                  published?.dist?.integrity &&
                  published?.dist?.attestations?.url
                ) {
                  return published;
                }
                lastError = new Error(`${name}@${version} is not fully visible in the registry yet.`);
              } catch (error) {
                lastError = error;
              }
              console.log(`Registry verification attempt ${attempt}/12 is not ready; retrying in 10s.`);
              await delay(10_000);
            }
            throw lastError;
          }

          async function verifyPublication() {
            const published = await waitForPublishedMetadata();
            const integrity = published.dist.integrity;
            const [algorithm, encodedDigest] = integrity.split("-", 2);
            if (algorithm !== "sha512" || !encodedDigest) {
              throw new Error(`Unexpected registry integrity: ${JSON.stringify(integrity)}.`);
            }
            const expectedDigest = Buffer.from(encodedDigest, "base64").toString("hex");

            const attestationDocument = await fetchJson(published.dist.attestations.url);
            const provenance = attestationDocument.attestations?.find(
              ({ predicateType }) => predicateType === "https://slsa.dev/provenance/v1",
            );
            if (!provenance?.bundle?.dsseEnvelope?.payload) {
              throw new Error("The registry has no SLSA provenance attestation for this release.");
            }
            const statement = JSON.parse(
              Buffer.from(provenance.bundle.dsseEnvelope.payload, "base64").toString("utf8"),
            );
            const workflow = statement.predicate?.buildDefinition?.externalParameters?.workflow;
            const invocationId = statement.predicate?.runDetails?.metadata?.invocationId;
            const subjectDigest = statement.subject?.[0]?.digest?.sha512;

            if (
              workflow?.repository !== expectedRepository ||
              workflow?.path !== expectedWorkflow ||
              workflow?.ref !== expectedRef ||
              !invocationId?.startsWith(`${expectedRepository}/actions/runs/`) ||
              subjectDigest !== expectedDigest
            ) {
              throw new Error("Published provenance does not match this repository, workflow, tag, run, and artifact.");
            }

            console.log(`Registry and provenance verified: ${name}@${version} (${integrity})`);
            console.log(`Provenance invocation: ${invocationId}`);
          }

          verifyPublication().catch((error) => {
            console.error(error);
            process.exitCode = 1;
          });
          NODE

      - name: Verify a clean registry install
        run: |
          package="$(node -p 'const { name, version } = require("./package.json"); name + "@" + version')"
          expected="$(node -p 'require("./package.json").version')"
          clean_dir="$(mktemp -d)"
          cd "$clean_dir"
          actual="$(npm exec --yes --package="$package" -- sc-xano --version)"
          if [ "$actual" != "$expected" ]; then
            echo "Registry-installed CLI reports $actual; expected $expected." >&2
            exit 1
          fi
          echo "Clean registry install verified: $package reports $actual"
